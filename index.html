<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toilet-Fight</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; user-select: none; -webkit-user-select: none; }
        #game-container { position: relative; width: 100%; max-width: 450px; height: 100%; max-height: 900px; background: #222; overflow: hidden; border: 2px solid #333; cursor: crosshair; touch-action: none; }
        #menu, #game-over, #pause-menu, #shop-menu, #agents-menu, #enemies-info, #reg-menu, #settings-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: #000; color: white; z-index: 100; }
        #menu { display: flex; }
        button { padding: 15px 30px; margin: 5px; font-size: 18px; cursor: pointer; }
        #hud { position: absolute; top: 15px; left: 15px; color: white; font-size: 20px; font-weight: bold; z-index: 50; pointer-events: none; }
        #pause-btn { position: absolute; top: 15px; right: 15px; padding: 8px 15px; z-index: 60; cursor: pointer; }
        
        #controls-layout { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 50; }
        #dpad { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px; }
        .dir-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; display: flex; align-items: center; justify-content: center; border-radius: 5px; pointer-events: auto; }
        
        #attack-btn { width: 100px; height: 100px; background: #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 4px solid white; cursor: pointer; font-size: 18px; transition: opacity 0.3s; pointer-events: auto; }
        #attack-btn.cooldown { opacity: 0.3; pointer-events: none; }
        .upgrade-panel { display: flex; gap: 10px; margin-bottom: 20px; }
        .upg-box { text-align: center; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; }
        #menu-chips { font-size: 24px; margin-bottom: 20px; color: #ff0; }
        input { padding: 10px; font-size: 18px; margin-bottom: 10px; width: 80%; }
        #player-name-display { font-size: 18px; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="reg-menu" style="display: none;">
        <h1>РЕГИСТРАЦИЯ</h1>
        <input type="text" id="playerName" placeholder="Введите ваше имя...">
        <button onclick="window.register()">ВОЙТИ</button>
    </div>
    <div id="hud">
        <div id="hp-display">HP: 10</div>
        <div id="chips-display">Чипы: 0</div>
        <div id="kill-display">Убито: 0</div>
    </div>
    <button id="pause-btn">ПАУЗА</button>

    <div id="menu">
        <div id="player-name-display"></div> <h1>Toilet-Fight</h1>
        <div id="menu-chips">Чипы: 0</div>
        <div id="agent-display" style="margin-bottom: 10px; color: #00ffcc;">Агент: Камера-Мен</div>
        <div class="upgrade-panel">
            <div class="upg-box">УРОН: <span id="dmg-lvl">0</span><br><button onclick="window.upgrade('dmg')">250</button></div>
            <div class="upg-box">HP: <span id="hp-lvl">0</span><br><button onclick="window.upgrade('hp')">200</button></div>
        </div>
        <button id="startBtn">ИГРАТЬ</button>
        <button id="shopBtn">МАГАЗИН</button>
        <button id="agentsBtn">АГЕНТЫ</button>
        <button onclick="document.getElementById('menu').style.display='none'; document.getElementById('enemies-info').style.display='flex'">ОПИСАНИЕ ВРАГОВ</button>
        <button onclick="window.openSettings('menu')">НАСТРОЙКИ</button>
    </div>

    <div id="settings-menu">
        <h1>НАСТРОЙКИ</h1>
        <button onclick="window.toggleAudio('music')">МУЗЫКА: <span id="mus-status">ВКЛ</span></button>
        <button onclick="window.toggleAudio('fx')">ЭФФЕКТЫ: <span id="fx-status">ВКЛ</span></button>
        <button onclick="window.logout()">ВЫЙТИ ИЗ АККАУНТА</button>
        <button id="backFromSettings">НАЗАД</button>
    </div>

    <div id="enemies-info">
        <h1>ВРАГИ</h1>
        <p>СКИБИДИСТ: 3 ХП, 1 урон</p>
        <p>ПРОКАЧЕННЫЙ: 5 ХП, 3 урона</p>
        <button onclick="document.getElementById('enemies-info').style.display='none'; document.getElementById('menu').style.display='flex'">НАЗАД</button>
    </div>

    <div id="shop-menu">
        <h1>МАГАЗИН</h1>
        <button id="buySpeakerBtn" onclick="window.buySpeaker()">СПИКЕР-МЕН (150)</button>
        <button id="buyBigBtn" onclick="window.buyBig()">БИГ-КАМЕРА МЕН (200)</button>
        <button onclick="document.getElementById('shop-menu').style.display='none'; document.getElementById('menu').style.display='flex'">НАЗАД</button>
    </div>

    <div id="agents-menu">
        <h1>АГЕНТЫ</h1>
        <button onclick="window.setAgent('camera')">КАМЕРА-МЕН</button>
        <button id="speakerBtn" style="display:none;" onclick="window.setAgent('speaker')">СПИКЕР-МЕН</button>
        <button id="bigBtn" style="display:none;" onclick="window.setAgent('big')">БИГ-КАМЕРА МЕН</button>
        <button onclick="document.getElementById('agents-menu').style.display='none'; document.getElementById('menu').style.display='flex'">НАЗАД</button>
    </div>

    <div id="pause-menu">
        <h1>ПАУЗА</h1>
        <button id="resumeBtn">ПРОДОЛЖИТЬ</button>
        <button onclick="window.openSettings('pause-menu')">НАСТРОЙКИ</button>
        <button onclick="location.reload()">ВЫХОД</button>
    </div>

    <div id="game-over">
        <h1>ВЫ ПРОИГРАЛИ</h1>
        <button onclick="location.reload()">В МЕНЮ</button>
    </div>

    <div id="controls-layout">
        <div id="dpad">
            <div></div><div class="dir-btn" onpointerdown="window.press('KeyW')" onpointerup="window.release('KeyW')" onpointerleave="window.release('KeyW')">▲</div><div></div>
            <div class="dir-btn" onpointerdown="window.press('KeyA')" onpointerup="window.release('KeyA')" onpointerleave="window.release('KeyA')">◀</div>
            <div class="dir-btn" onpointerdown="window.press('KeyS')" onpointerup="window.release('KeyS')" onpointerleave="window.release('KeyS')">▼</div>
            <div class="dir-btn" onpointerdown="window.press('KeyD')" onpointerup="window.release('KeyD')" onpointerleave="window.release('KeyD')">▶</div>
        </div>
        <div id="attack-btn">УДАР</div>
    </div>
</div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
<script type="module">
    import * as THREE from 'three';
    const container = document.getElementById('game-container');
    const loader = new THREE.TextureLoader();
    
    let listener, menuMusic, audioLoader;
    let musicEnabled = localStorage.getItem('audio_music') !== 'false';
    let fxEnabled = localStorage.getItem('audio_fx') !== 'false';
    let prevMenu = '';

    const loadSharp = (url) => { const tex = loader.load(url); tex.minFilter = THREE.LinearMipMapLinearFilter; tex.magFilter = THREE.LinearFilter; tex.anisotropy = 16; return tex; };

    let scene, camera, renderer, player, enemies = [], medkit = null, walls = [];
    let isPlaying = false, isPaused = false, isMouseDown = false, velocityY = 0, lastPointerX = 0, lastPointerY = 0;
    let playerHP = 10, lastDamageTime = 0, attackCooldown = false;
    let camRot = { theta: 0, phi: 0.8 }, camDist = 12;
    
    let playerName = localStorage.getItem('playerName');
    if (!playerName) { document.getElementById('reg-menu').style.display = 'flex'; document.getElementById('menu').style.display = 'none'; }
    
    window.register = () => { playerName = document.getElementById('playerName').value; if(playerName) { localStorage.setItem('playerName', playerName); document.getElementById('reg-menu').style.display = 'none'; document.getElementById('menu').style.display = 'flex'; updateDisplay(); } };
    window.logout = () => { localStorage.removeItem('playerName'); location.reload(); };

    window.toggleAudio = (type) => {
        if(type === 'music') { musicEnabled = !musicEnabled; localStorage.setItem('audio_music', musicEnabled); if(!musicEnabled) menuMusic.pause(); else menuMusic.play(); }
        else { fxEnabled = !fxEnabled; localStorage.setItem('audio_fx', fxEnabled); }
        document.getElementById('mus-status').innerText = musicEnabled ? 'ВКЛ' : 'ВЫКЛ';
        document.getElementById('fx-status').innerText = fxEnabled ? 'ВКЛ' : 'ВЫКЛ';
    };

    window.openSettings = (from) => { prevMenu = from; document.getElementById(from).style.display = 'none'; document.getElementById('settings-menu').style.display = 'flex'; };
    document.getElementById('backFromSettings').onclick = () => { document.getElementById('settings-menu').style.display = 'none'; document.getElementById(prevMenu).style.display = 'flex'; };

    let chips = parseInt(localStorage.getItem(playerName + '_chips')) || 0;
    let killCount = parseInt(localStorage.getItem(playerName + '_kills')) || 0;
    let dmgLvl = parseInt(localStorage.getItem(playerName + '_dmgLvl')) || 0;
    let hpLvl = parseInt(localStorage.getItem(playerName + '_hpLvl')) || 0;
    let hasSpeaker = localStorage.getItem(playerName + '_hasSpeaker') === 'true';
    let hasBig = localStorage.getItem(playerName + '_hasBig') === 'true';
    let activeAgent = localStorage.getItem(playerName + '_activeAgent') || 'camera';

    function saveProgress() { if(!playerName) return; localStorage.setItem(playerName + '_chips', chips); localStorage.setItem(playerName + '_kills', killCount); localStorage.setItem(playerName + '_dmgLvl', dmgLvl); localStorage.setItem(playerName + '_hpLvl', hpLvl); localStorage.setItem(playerName + '_hasSpeaker', hasSpeaker); localStorage.setItem(playerName + '_hasBig', hasBig); localStorage.setItem(playerName + '_activeAgent', activeAgent); }
    
    function updateDisplay() { 
        document.getElementById('player-name-display').innerText = "Игрок: " + (playerName || "Гость");
        document.getElementById('chips-display').innerText = "Чипы: " + chips; 
        document.getElementById('menu-chips').innerText = "Чипы: " + chips; 
        document.getElementById('kill-display').innerText = "Убито: " + killCount; 
        document.getElementById('dmg-lvl').innerText = dmgLvl; 
        document.getElementById('hp-lvl').innerText = hpLvl; 
        document.getElementById('mus-status').innerText = musicEnabled ? 'ВКЛ' : 'ВЫКЛ';
        document.getElementById('fx-status').innerText = fxEnabled ? 'ВКЛ' : 'ВЫКЛ';
        saveProgress(); 
    }
    
    window.buySpeaker = () => { if(chips >= 150) { chips -= 150; hasSpeaker = true; updateDisplay(); } };
    window.buyBig = () => { if(chips >= 200) { chips -= 200; hasBig = true; updateDisplay(); } };
    
    const pressedKeys = new Set();
    window.press = (code) => pressedKeys.add(code);
    window.release = (code) => pressedKeys.delete(code);
    window.upgrade = (type) => { if (type === 'dmg' && chips >= 250) { chips -= 250; dmgLvl++; document.getElementById('dmg-lvl').innerText = dmgLvl; } else if (type === 'hp' && chips >= 200) { chips -= 200; hpLvl++; playerHP += 5; document.getElementById('hp-lvl').innerText = hpLvl; document.getElementById('hp-display').innerText = "HP: " + playerHP; } updateDisplay(); };

    scene = new THREE.Scene(); scene.background = new THREE.Color(0x87ceeb);
    camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({antialias: true}); renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement); scene.add(new THREE.AmbientLight(0xffffff, 1));
    
    listener = new THREE.AudioListener();
    camera.add(listener);
    const context = listener.context;
    const lowPassFilter = context.createBiquadFilter();
    lowPassFilter.type = 'lowpass'; lowPassFilter.frequency.value = 800;
    const delay = context.createDelay(); delay.delayTime.value = 0.2;
    const feedback = context.createGain(); feedback.gain.value = 0.4;
    delay.connect(feedback); feedback.connect(delay);
    
    menuMusic = new THREE.Audio(listener);
    audioLoader = new THREE.AudioLoader();
    audioLoader.load('menu_sound.mp3', (buffer) => {
        menuMusic.setBuffer(buffer); menuMusic.setLoop(true); menuMusic.setVolume(0.3);
        menuMusic.getOutput().disconnect(); menuMusic.getOutput().connect(lowPassFilter);
        lowPassFilter.connect(delay); delay.connect(listener.gain);
        if(musicEnabled) menuMusic.play();
    });

    const createTex = (url, rx, ry) => { const t = loadSharp(url); t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(rx, ry); return t; };
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({ map: createTex('grass.png', 20, 20) })); floor.rotation.x = -Math.PI / 2; scene.add(floor);
    
    const wallBoundaries = [{x:0, z:50, w:100, d:2}, {x:0, z:-50, w:100, d:2}, {x:50, z:0, w:2, d:100}, {x:-50, z:0, w:2, d:100}];
    wallBoundaries.forEach(b => { const wall = new THREE.Mesh(new THREE.BoxGeometry(b.w, 12, b.d), new THREE.MeshBasicMaterial({ map: createTex('walls.jpg', 20, 1) })); wall.position.set(b.x, 6, b.z); scene.add(wall); walls.push(new THREE.Box3().setFromObject(wall)); });

    player = new THREE.Mesh(new THREE.PlaneGeometry(2, 2.5), new THREE.MeshBasicMaterial({ map: loadSharp('Kamera-Men.png'), transparent: true, alphaTest: 0.5, side: THREE.DoubleSide }));
    window.setAgent = (type) => { activeAgent = type; const size = (type === 'big') ? 3.5 : 2; player.scale.set(size/2, size/2.5, 1); player.material.map = loadSharp(type === 'speaker' ? 'spiker.png' : (type === 'big' ? 'big_cam.png' : 'Kamera-Men.png')); updateDisplay(); };
    window.setAgent(activeAgent); player.position.set(0, 1.25, 0); scene.add(player);

    function spawnMedkit() { if(medkit) scene.remove(medkit); let chance = (playerHP < 5) ? 0.5 : 0.1; if(Math.random() < chance) { medkit = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), new THREE.MeshBasicMaterial({ map: loadSharp('aptechka.png'), transparent: true, alphaTest: 0.5 })); medkit.scale.set(2.5, 2.5, 1); medkit.position.set((Math.random()-0.5)*80, 0.75, (Math.random()-0.5)*80); scene.add(medkit); } }
    
    function spawnEnemy() { 
        let isUpg = Math.random() < 0.4; 
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 3.5), new THREE.MeshBasicMaterial({ map: loadSharp(isUpg ? 'Upg_Skibidi.png' : 'Skibidi.png'), transparent: true, alphaTest: 0.5, side: THREE.DoubleSide })); 
        mesh.position.set((Math.random()-0.5)*80, 1.75, (Math.random()-0.5)*80); 
        scene.add(mesh); 
        const sound = new THREE.PositionalAudio(listener);
        audioLoader.load('skibidi_sound.mp3', (buffer) => { sound.setBuffer(buffer); sound.setRefDistance(5); sound.setLoop(true); if(fxEnabled) sound.play(); });
        mesh.add(sound);
        enemies.push({ mesh, hp: isUpg ? 5 : 3, damage: isUpg ? 3 : 1, sound }); 
    }

    document.getElementById('startBtn').onclick = () => { menuMusic.stop(); document.getElementById('menu').style.display='none'; isPlaying=true; for(let i=0; i<3; i++) spawnEnemy(); setInterval(spawnMedkit, 15000); };
    document.getElementById('shopBtn').onclick = () => { document.getElementById('menu').style.display='none'; document.getElementById('shop-menu').style.display='flex'; };
    document.getElementById('agentsBtn').onclick = () => { document.getElementById('menu').style.display='none'; document.getElementById('agents-menu').style.display='flex'; };
    document.getElementById('pause-btn').onclick = () => { isPaused=true; document.getElementById('pause-menu').style.display='flex'; menuMusic.pause(); enemies.forEach(e => e.sound.pause()); };
    document.getElementById('resumeBtn').onclick = () => { isPaused=false; document.getElementById('pause-menu').style.display='none'; if(musicEnabled) menuMusic.play(); if(fxEnabled) enemies.forEach(e => e.sound.play()); };

    container.addEventListener('pointerdown', (e) => { if (e.target.classList.contains('dir-btn') || e.target.id === 'attack-btn') return; isMouseDown = true; lastPointerX = e.clientX; lastPointerY = e.clientY; });
    window.addEventListener('pointermove', (e) => { if(isMouseDown && isPlaying && !isPaused) { camRot.theta += (e.clientX - lastPointerX) * 0.01; camRot.phi += (e.clientY - lastPointerY) * 0.01; camRot.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, camRot.phi)); lastPointerX = e.clientX; lastPointerY = e.clientY; } });
    window.onpointerup = () => isMouseDown = false; window.onpointerleave = () => isMouseDown = false;
    window.onkeydown = (e) => { pressedKeys.add(e.code); if (e.code === 'Space' && player.position.y <= 1.26) velocityY = 0.25; };
    window.onkeyup = (e) => pressedKeys.delete(e.code);
    
    document.getElementById('attack-btn').onclick = () => { if(attackCooldown || !isPlaying || isPaused) return; enemies.forEach((e, i) => { if(e.mesh.position.distanceTo(player.position) < 5) { e.hp -= (activeAgent === 'big' ? 3 : 1) + dmgLvl; if(e.hp <= 0) { scene.remove(e.mesh); enemies.splice(i, 1); chips += 10; killCount++; updateDisplay(); spawnEnemy(); } } }); attackCooldown = true; setTimeout(() => { attackCooldown = false; }, activeAgent === 'big' ? 1500 : 1000); };

    function animate(time) {
        requestAnimationFrame(animate); renderer.render(scene, camera);
        if(!isPlaying || isPaused) return;
        velocityY -= 0.012; player.position.y += velocityY; if(player.position.y < 1.25) { player.position.y = 1.25; velocityY = 0; }
        let move = new THREE.Vector3(0,0,0);
        if(pressedKeys.has('KeyW')) move.z -= 0.15; if(pressedKeys.has('KeyS')) move.z += 0.15; if(pressedKeys.has('KeyA')) move.x -= 0.15; if(pressedKeys.has('KeyD')) move.x += 0.15;
        let moveWorld = move.applyAxisAngle(new THREE.Vector3(0,1,0), camRot.theta);
        let nextPos = player.position.clone().add(moveWorld);
        let playerBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(1, 2.5, 1));
        let canMove = true;
        for(let wall of walls) { if(playerBox.intersectsBox(wall)) canMove = false; }
        if(canMove) player.position.copy(nextPos);
        
        if(medkit) {
            medkit.lookAt(camera.position.x, medkit.position.y, camera.position.z);
            if(player.position.distanceTo(medkit.position) < 2) { playerHP = Math.min(10 + hpLvl*5, playerHP + 5); document.getElementById('hp-display').innerText="HP: "+playerHP; scene.remove(medkit); medkit = null; }
        }

        player.lookAt(camera.position.x, player.position.y, camera.position.z);
        let cp = new THREE.Vector3(player.position.x + camDist*Math.sin(camRot.theta)*Math.cos(camRot.phi), player.position.y+2+camDist*Math.sin(camRot.phi), player.position.z + camDist*Math.cos(camRot.theta)*Math.cos(camRot.phi));
        camera.position.lerp(cp, 0.2); camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
        enemies.forEach(e => { e.mesh.lookAt(camera.position.x, e.mesh.position.y, camera.position.z); let dir = player.position.clone().sub(e.mesh.position).normalize().multiplyScalar(0.02); e.mesh.position.add(dir); e.mesh.position.y = 1.75; if(e.mesh.position.distanceTo(player.position) < 2.5 && time - lastDamageTime > 2000 && Math.random() < 0.1) { playerHP -= e.damage; document.getElementById('hp-display').innerText="HP: "+playerHP; lastDamageTime=time; if(playerHP <= 0) document.getElementById('game-over').style.display='flex'; } });
    }
    animate(); updateDisplay();
</script>
</body>
</html>
